name: AI Issue Resolver

on:
  issues:
    types: [opened]

jobs:
  resolve-issue:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai
          
      - name: Run AI Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # If the API key is empty, the python script will fail gracefully
          python ai-agent/resolver.py
          
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'feat: AI resolution for issue #${{ github.event.issue.number }}'
          title: 'Resolve Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}'
          body: |
            Automated PR generated by the GenAI Agent in response to Issue #${{ github.event.issue.number }}.
            
            This PR contains the code modifications generated by the AI to resolve the issue. Please review the changes before merging.
            
            Resolves #${{ github.event.issue.number }}
          branch: ai-resolver/issue-${{ github.event.issue.number }}
          base: main
          delete-branch: true
